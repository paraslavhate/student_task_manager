{% extends 'layout.html' %}

{% block content %}

<h2>Mark Attendance</h2>

<form action="/save_attendance" method="POST">

    <div class="mb-3">

        <label class="form-label">
            Student
        </label>

        <select
            name="student_id"
            class="form-control"
            required
        >

            {% for student in students %}

            <option value="{{ student.student_id }}">
                {{ student.first_name }}
                {{ student.last_name }}
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Status
        </label>

        <select
            name="attendance_status"
            class="form-control"
            required
        >

            <option value="Present">
                Present
            </option>

            <option value="Absent">
                Absent
            </option>

        </select>

    </div>

    <button
        type="submit"
        class="btn btn-primary"
    >
        Save Attendance
    </button>

</form>

{% endblock %}
